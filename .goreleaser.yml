version: 2

project_name: translate-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: t
    main: ./cmd/t
    binary: t
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    ids:
      - t
    name_template: >-
      t-{{ .Os }}-{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: checksums.txt

brews:
  - name: translate-cli
    ids:
      - default
    repository:
      owner: potato4d
      name: homebrew-tap
    directory: Formula
    homepage: https://github.com/potato4d/translate-cli
    description: Translate text through local Agent CLIs
    license: MIT
    install: |
      bin.install "t"
    test: |
      system "#{bin}/t", "--version"

release:
  github:
    owner: potato4d
    name: translate-cli
