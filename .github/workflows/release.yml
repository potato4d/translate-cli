name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build:release
      - name: Create GitHub release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/t-darwin-amd64.tar.gz \
            dist/t-darwin-arm64.tar.gz \
            dist/t-linux-amd64.tar.gz \
            dist/t-linux-arm64.tar.gz \
            dist/t-windows-amd64.zip \
            dist/checksums.txt \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
